name: Linter
on: pull_request

jobs:
  java:
    name: Lint .java files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
        
      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Run Maven formatter
        run: mvn formatter:format

      - name: Commit changes
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10
        with:
          author_name: PhoenicisBot
          author_email: git@phoenicis.org
          message: 'Lint .java files'
          add: '*.java'
