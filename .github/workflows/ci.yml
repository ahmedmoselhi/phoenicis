name: CI
on:
  pull_request:
  push:
    branches:
    - master

jobs:
  build-and-package-linux:
    name: Build and Package (Ubuntu Java 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 20 (Temurin)
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '20'
          cache: 'maven'
      - name: Install dependencies
        run: sudo npm install -g less
      - name: Build with Maven
        run: mvn clean package
      - name: Create Linux package (.deb)
        run: |
          # Use the packaging script to generate the Linux package
          cd phoenicis-dist/src/scripts
          bash phoenicis-create-package.sh
      - uses: actions/upload-artifact@v4
        with:
          name: Linux-Package-Java20
          path: phoenicis-dist/target/*.deb
          if-no-files-found: error

  create-draft-release:
    name: Create Draft Release and Upload Artifacts
    needs: build-and-package-linux
    runs-on: ubuntu-latest
    # This job only runs when pushing directly to the 'master' branch, not for PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: Linux-Package-Java20
          path: release-assets # Download the artifact to a folder named 'release-assets'

      - name: Create Draft Release and Upload Files
        uses: softprops/action-gh-release@v1
        with:
          # Use the commit SHA as a unique identifier for the release tag and name
          tag_name: ci-build-${{ github.sha }}
          name: CI Build ${{ github.sha }}
          body: |
            This is an automated draft release containing the Linux package (.deb).
            It was built from commit ${{ github.sha }}.
          draft: true # Set to true to create a draft release
          # Path points to the downloaded artifact
          files: release-assets/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Required for interacting with the GitHub API

